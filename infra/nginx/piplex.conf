server {
    listen 80;
    server_name piplex.in www.piplex.in;
    return 301 https://piplex.in$request_uri;
}

server {
    listen 443 ssl;
    server_name piplex.in www.piplex.in;

    ssl_certificate     /etc/letsencrypt/live/piplex.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/piplex.in/privkey.pem;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # API layer
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health checks
    location /health/ingestion {
        proxy_pass http://localhost:8000/health;
    }

    location /health/ai {
        proxy_pass http://localhost:8002/health;
    }

    location /health/webhook {
        proxy_pass http://localhost:8003/health;
    }

    # Ingestion API
    location /ingest {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Webhook collector
    location /webhook {
        proxy_pass http://localhost:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI engine
    location /ai {
        proxy_pass http://localhost:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend (catch-all)
    location / {
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }
}

