services:

  # ── Infrastructure ────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pipeline_debugger
      POSTGRES_USER: debugger
      POSTGRES_PASSWORD: debugger
    ports:
      - "5434:5432"   # 5434 on host to avoid conflict with local Homebrew postgres on 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debugger -d pipeline_debugger"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # 6380 on host to avoid conflict with local Redis on 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend Services ──────────────────────────────────────────────

  api-layer:
    build:
      context: .
      dockerfile: services/api-layer/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://debugger:debugger@postgres:5432/pipeline_debugger
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy

  ingestion-api:
    build:
      context: .
      dockerfile: services/log-ingestion-api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://debugger:debugger@postgres:5432/pipeline_debugger
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  webhook-collector:
    build:
      context: .
      dockerfile: services/log-collection-layer/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - INGEST_URL=http://ingestion-api:8000/ingest
    depends_on:
      ingestion-api:
        condition: service_healthy

  ai-engine:
    build:
      context: .
      dockerfile: services/ai-debugging-engine/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      - DATABASE_URL=postgresql://debugger:debugger@postgres:5432/pipeline_debugger
    depends_on:
      postgres:
        condition: service_healthy

  queue-worker:
    build:
      context: .
      dockerfile: services/queue-worker/Dockerfile
    environment:
      - DATABASE_URL=postgresql://debugger:debugger@postgres:5432/pipeline_debugger
      - REDIS_URL=redis://redis:6379
      - AI_ENGINE_URL=http://ai-engine:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-engine:
        condition: service_started

  # ── Frontend ──────────────────────────────────────────────────────

  frontend:
    build:
      context: .
      dockerfile: frontend/web-dashboard/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-}
    depends_on:
      - api-layer

volumes:
  postgres_data:
  redis_data:
