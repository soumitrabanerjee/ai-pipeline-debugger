<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 152 40" width="152" height="40">
  <defs>
    <linearGradient id="hex-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Hexagon icon -->
  <path d="M15,3 L25,3 L31,13 L25,23 L15,23 L9,13 Z" fill="url(#hex-grad)"/>

  <!-- Pipeline flow arrows inside hex (two chevrons) -->
  <path d="M13,10 L17,13 L13,16"
        fill="none" stroke="white" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M18,10 L22,13 L18,16"
        fill="none" stroke="white" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- Wordmark: "Pi" white + "Plex" indigo -->
  <text x="40" y="28"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="22" fill="white">Pi</text>
  <text x="65" y="28"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="22" fill="#818cf8">Plex</text>
</svg>
